<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom styles for increment/decrement logic */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-pure-white text-clinical-charcoal min-h-screen flex flex-col items-center justify-center font-body-md antialiased md:p-lg p-sm selection:bg-surface-variant">
<!-- Top Navigation (Onboarding Context - Simplified) -->
<header class="w-full max-w-[480px] flex items-center justify-between py-md border-b border-border-subtle mb-xl px-sm md:px-0">
<button aria-label="Back" class="text-clinical-charcoal hover:opacity-80 transition-opacity p-xs">
<span class="material-symbols-outlined text-headline-md">arrow_back</span>
</button>
<div class="font-headline-md text-headline-md font-bold tracking-tight">LightCare</div>
<div class="w-8"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Container -->
<main class="w-full max-w-[480px] flex-1 flex flex-col px-sm md:px-0">
<!-- Header Section -->
<div class="mb-xl text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg mb-sm">医学营养基准线</h1>
<p class="font-body-md text-body-md text-outline">第一步：身体数据录入</p>
</div>
<!-- Form Section -->
<form class="space-y-md flex-1">
<!-- Gender Selection -->
<div class="flex flex-col border border-border-subtle p-md">
<label class="font-label-md text-label-md uppercase text-outline mb-sm">性别</label>
<div class="grid grid-cols-2 gap-sm">
<label class="relative cursor-pointer">
<input checked="" class="peer sr-only" name="gender" type="radio" value="male"/>
<div class="flex flex-col items-center justify-center p-md border border-border-subtle peer-checked:border-clinical-charcoal peer-checked:bg-surface transition-colors">
<span class="material-symbols-outlined text-display-lg mb-xs">male</span>
<span class="font-label-sm text-label-sm">男</span>
</div>
</label>
<label class="relative cursor-pointer">
<input class="peer sr-only" name="gender" type="radio" value="female"/>
<div class="flex flex-col items-center justify-center p-md border border-border-subtle peer-checked:border-clinical-charcoal peer-checked:bg-surface transition-colors">
<span class="material-symbols-outlined text-display-lg mb-xs">female</span>
<span class="font-label-sm text-label-sm">女</span>
</div>
</label>
</div>
</div>
<!-- Age Input -->
<div class="flex items-center justify-between border-b border-border-subtle py-md">
<label class="font-label-md text-label-md uppercase text-outline">年龄</label>
<div class="flex items-center space-x-md">
<button class="p-xs hover:bg-surface transition-colors border border-transparent hover:border-border-subtle rounded-DEFAULT" onclick="decrementValue('age')" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
<input class="w-16 text-center font-display-lg text-display-lg bg-transparent border-none focus:ring-0 p-0" id="age" type="number" value="32"/>
<button class="p-xs hover:bg-surface transition-colors border border-transparent hover:border-border-subtle rounded-DEFAULT" onclick="incrementValue('age')" type="button">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Height Input -->
<div class="flex items-center justify-between border-b border-border-subtle py-md">
<label class="font-label-md text-label-md uppercase text-outline flex flex-col">
                    身高
                    <span class="font-label-sm text-label-sm text-outline-variant mt-xs">厘米</span>
</label>
<div class="flex items-center space-x-md">
<button class="p-xs hover:bg-surface transition-colors border border-transparent hover:border-border-subtle rounded-DEFAULT" onclick="decrementValue('height')" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
<input class="w-20 text-center font-display-lg text-display-lg bg-transparent border-none focus:ring-0 p-0" id="height" type="number" value="175"/>
<button class="p-xs hover:bg-surface transition-colors border border-transparent hover:border-border-subtle rounded-DEFAULT" onclick="incrementValue('height')" type="button">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Current Weight Input -->
<div class="flex items-center justify-between border-b border-border-subtle py-md">
<label class="font-label-md text-label-md uppercase text-outline flex flex-col">
                    当前体重
                    <span class="font-label-sm text-label-sm text-outline-variant mt-xs">公斤</span>
</label>
<div class="flex items-center space-x-md">
<button class="p-xs hover:bg-surface transition-colors border border-transparent hover:border-border-subtle rounded-DEFAULT" onclick="decrementValue('current_weight', 0.5)" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
<input class="w-24 text-center font-display-lg text-display-lg bg-transparent border-none focus:ring-0 p-0" id="current_weight" step="0.5" type="number" value="70.5"/>
<button class="p-xs hover:bg-surface transition-colors border border-transparent hover:border-border-subtle rounded-DEFAULT" onclick="incrementValue('current_weight', 0.5)" type="button">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Goal Weight Input -->
<div class="flex items-center justify-between border-b border-border-subtle py-md">
<label class="font-label-md text-label-md uppercase text-outline flex flex-col">
                    目标体重
                    <span class="font-label-sm text-label-sm text-outline-variant mt-xs">公斤</span>
</label>
<div class="flex items-center space-x-md">
<button class="p-xs hover:bg-surface transition-colors border border-transparent hover:border-border-subtle rounded-DEFAULT" onclick="decrementValue('goal_weight', 0.5)" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
<input class="w-24 text-center font-display-lg text-display-lg bg-transparent border-none focus:ring-0 p-0 text-surgical-green" id="goal_weight" step="0.5" type="number" value="65.0"/>
<button class="p-xs hover:bg-surface transition-colors border border-transparent hover:border-border-subtle rounded-DEFAULT" onclick="incrementValue('goal_weight', 0.5)" type="button">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</form>
<!-- Bottom Action Area -->
<div class="mt-xl pt-lg border-t border-border-subtle sticky bottom-0 bg-pure-white py-md">
<button class="w-full bg-clinical-charcoal text-pure-white font-label-md text-label-md uppercase py-lg rounded-DEFAULT hover:opacity-90 transition-opacity active:scale-[0.98] flex items-center justify-center space-x-sm" type="button">
<span>计算基准线</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
<script>
        function incrementValue(id, step = 1) {
            const input = document.getElementById(id);
            let val = parseFloat(input.value);
            if (!isNaN(val)) {
                input.value = (val + step).toFixed(step < 1 ? 1 : 0);
            }
        }

        function decrementValue(id, step = 1) {
            const input = document.getElementById(id);
            let val = parseFloat(input.value);
            if (!isNaN(val) && val > step) {
                input.value = (val - step).toFixed(step < 1 ? 1 : 0);
            }
        }
    </script>
</body></html>
