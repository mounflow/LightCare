<!DOCTYPE html>

<html class="light" lang="zh"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LightCare - 识别结果</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "outline": "#747878",
                        "surface-container-highest": "#e1e3e4",
                        "tertiary-fixed": "#e6e1df",
                        "inverse-primary": "#c8c6c5",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#484645",
                        "on-surface": "#191c1d",
                        "inverse-surface": "#2e3132",
                        "on-primary-fixed-variant": "#474646",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "primary-fixed": "#e5e2e1",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#1c1b1b",
                        "surgical-green": "#00A36C",
                        "primary-fixed-dim": "#c8c6c5",
                        "on-primary": "#ffffff",
                        "border-subtle": "#E2E8F0",
                        "surface": "#f8fafb",
                        "surface-container-high": "#e6e8e9",
                        "secondary": "#006c46",
                        "surface-tint": "#5f5e5e",
                        "secondary-fixed-dim": "#5ddda1",
                        "inverse-on-surface": "#eff1f2",
                        "primary": "#000000",
                        "surface-bright": "#f8fafb",
                        "secondary-container": "#7bfabb",
                        "on-surface-variant": "#444748",
                        "on-tertiary-fixed": "#1c1b1a",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#cac6c3",
                        "secondary-fixed": "#7bfabb",
                        "surface-container-low": "#f2f4f5",
                        "on-background": "#191c1d",
                        "tertiary": "#000000",
                        "border-strong": "#121212",
                        "on-primary-container": "#858383",
                        "surface-variant": "#e1e3e4",
                        "outline-variant": "#c4c7c7",
                        "surface-container": "#eceeef",
                        "on-secondary-fixed": "#002112",
                        "on-secondary-container": "#00734b",
                        "tertiary-container": "#1c1b1a",
                        "on-tertiary-container": "#868381",
                        "on-primary-fixed": "#1c1b1b",
                        "background": "#f8fafb",
                        "on-secondary-fixed-variant": "#005234",
                        "clinical-charcoal": "#121212",
                        "error-container": "#ffdad6",
                        "pure-white": "#FFFFFF",
                        "surface-dim": "#d8dadb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "md": "16px",
                        "xs": "4px",
                        "margin-desktop": "64px",
                        "sm": "8px",
                        "xl": "40px",
                        "lg": "24px",
                        "margin-mobile": "20px",
                        "gutter": "16px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "1", "fontWeight": "500" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .wireframe-bg {
            background-image: 
                linear-gradient(to right, #E2E8F0 1px, transparent 1px),
                linear-gradient(to bottom, #E2E8F0 1px, transparent 1px);
            background-size: 32px 32px;
            background-position: center center;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased wireframe-bg relative overflow-hidden">
<!-- Blurred Background Layer (Simulating Camera View) -->
<div class="absolute inset-0 z-0 bg-pure-white/80 backdrop-blur-md"></div>
<!-- Top Navigation (Suppressed per rules for transactional screen, replacing with a simple back/close header) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile md:px-margin-desktop h-20 border-b border-border-subtle bg-pure-white/90 backdrop-blur-sm">
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center w-10 h-10 border border-transparent hover:border-border-subtle rounded-DEFAULT">
<span class="material-symbols-outlined">close</span>
</button>
<div class="font-headline-md text-headline-md text-primary font-bold tracking-tight">LightCare</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Canvas -->
<main class="flex-1 relative z-10 flex flex-col items-center justify-center px-margin-mobile py-24 w-full max-w-2xl mx-auto">
<!-- Recognition Results Card -->
<div class="w-full bg-pure-white border border-border-subtle rounded-DEFAULT overflow-hidden flex flex-col">
<!-- Card Header -->
<div class="px-lg py-md border-b border-border-subtle flex items-center justify-between bg-surface-bright">
<h2 class="font-headline-md text-headline-md text-primary">识别结果</h2>
<span class="material-symbols-outlined text-surgical-green" style="font-variation-settings: 'FILL' 0, 'wght' 400;">check_circle</span>
</div>
<!-- Identified Items List -->
<div class="flex flex-col">
<!-- Item 1 -->
<div class="px-lg py-md border-b border-border-subtle flex items-center justify-between group hover:bg-surface transition-colors">
<div class="flex items-center gap-md">
<div class="w-12 h-12 border border-border-subtle rounded-DEFAULT flex items-center justify-center bg-surface-container-low">
<span class="material-symbols-outlined text-outline">local_cafe</span>
</div>
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-primary">燕麦拿铁 (Oat Latte)</span>
<span class="font-label-sm text-label-sm text-outline-variant mt-xs">饮品</span>
</div>
</div>
<div class="flex items-center gap-md">
<span class="font-body-md text-body-md text-on-surface font-medium">120 Kcal</span>
<button class="text-outline-variant hover:text-primary transition-colors p-sm border border-transparent hover:border-border-subtle rounded-DEFAULT">
<span class="material-symbols-outlined text-[18px]">edit</span>
</button>
</div>
</div>
<!-- Item 2 -->
<div class="px-lg py-md border-b border-border-subtle flex items-center justify-between group hover:bg-surface transition-colors">
<div class="flex items-center gap-md">
<div class="w-12 h-12 border border-border-subtle rounded-DEFAULT flex items-center justify-center bg-surface-container-low">
<span class="material-symbols-outlined text-outline">bakery_dining</span>
</div>
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-primary">全麦面包 (Whole Wheat Bread)</span>
<span class="font-label-sm text-label-sm text-outline-variant mt-xs">烘焙</span>
</div>
</div>
<div class="flex items-center gap-md">
<span class="font-body-md text-body-md text-on-surface font-medium">150 Kcal</span>
<button class="text-outline-variant hover:text-primary transition-colors p-sm border border-transparent hover:border-border-subtle rounded-DEFAULT">
<span class="material-symbols-outlined text-[18px]">edit</span>
</button>
</div>
</div>
</div>
<!-- Total Breakdown -->
<div class="px-lg py-lg bg-surface-container-low relative">
<!-- Vertical accent line indicating active/healthy metrics -->
<div class="absolute left-0 top-0 bottom-0 w-[2px] bg-surgical-green"></div>
<div class="flex flex-col md:flex-row md:items-center justify-between gap-md">
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-outline uppercase tracking-wider mb-xs">总计预估</span>
<span class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary font-bold">270 Kcal</span>
</div>
<div class="flex items-center gap-md">
<div class="flex flex-col items-center justify-center border border-border-subtle bg-pure-white rounded-DEFAULT px-md py-sm min-w-[64px]">
<span class="font-label-sm text-label-sm text-outline mb-xs">蛋白质</span>
<span class="font-body-md text-body-md text-primary font-medium">12g</span>
</div>
<div class="flex flex-col items-center justify-center border border-border-subtle bg-pure-white rounded-DEFAULT px-md py-sm min-w-[64px]">
<span class="font-label-sm text-label-sm text-outline mb-xs">脂肪</span>
<span class="font-body-md text-body-md text-primary font-medium">8g</span>
</div>
<div class="flex flex-col items-center justify-center border border-border-subtle bg-pure-white rounded-DEFAULT px-md py-sm min-w-[64px]">
<span class="font-label-sm text-label-sm text-outline mb-xs">碳水</span>
<span class="font-body-md text-body-md text-primary font-medium">45g</span>
</div>
</div>
</div>
</div>
</div>
<!-- Confirm Action -->
<div class="mt-xl w-full flex flex-col gap-md">
<button class="w-full bg-surgical-green text-pure-white font-label-md text-label-md uppercase tracking-wider py-md px-lg rounded-DEFAULT flex items-center justify-center gap-sm hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 600;">check</span>
                确认并记录
            </button>
<button class="w-full border border-border-subtle text-primary bg-pure-white font-label-md text-label-md uppercase tracking-wider py-md px-lg rounded-DEFAULT hover:border-border-strong transition-colors">
                重拍
            </button>
</div>
</main>
</body></html>
